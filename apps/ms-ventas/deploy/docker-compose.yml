services:

  db-ventas:
    image: postgres:15-alpine
    container_name: db_ventas
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_ventas_data:/var/lib/postgresql/data
    ports:
      - "5440:5432"
    networks:
      - ivent-network

  ms-ventas:
    container_name: ms-ventas
    build:
      context: ../../../
      dockerfile: ./apps/ms-ventas/deploy/Dockerfile
      args:
        - MICROSERVICIO=ms-ventas
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${DB_USER}:${DB_PASSWORD}@db-ventas:5432/${DB_NAME}?schema=public
      DB_HOST: db-ventas
    expose:     
      - "3000"
    depends_on:
      - db-ventas
    networks:
      - ivent-network

volumes:
  postgres_ventas_data:

networks:
  ivent-network:
    driver: bridge
    external: true