{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.msName }}-deployment
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.msName }}
  template:
    metadata:
      labels:
        app: {{ .Values.msName }}
    spec:
      containers:
        - name: {{ .Values.msName }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: Always
          ports:
            - containerPort: {{ .Values.global.env.PORT }}
          envFrom:
            - configMapRef:
                name: {{ .Values.msName }}-config
          env:
            # 1. Traemos el token del Secret que creaste en la terminal
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: github-token
                  key: token
            # 2. Construimos la URL con el token dinámicamente
            - name: REPO_GIT
              value: "https://$(GITHUB_TOKEN)@github.com/jorgeasca/Ivent_app.git"
            - name: MICROSERVICIO
              value: "ms-inventario"
              
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ivent-global-secrets
                  key: POSTGRES_PASSWORD
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: ivent-global-secrets
                  key: POSTGRES_DB
            - name: DB_HOST
              value: "ms-inventario-db" 
            
            
            - name: DATABASE_URL
              value: "postgresql://postgres:$(DB_PASSWORD)@$(DB_HOST):5432/$(DB_NAME)"
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: ivent-global-secrets
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ivent-global-secrets
                  key: POSTGRES_PASSWORD
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: ivent-global-secrets
                  key: POSTGRES_DB
{{- end }}