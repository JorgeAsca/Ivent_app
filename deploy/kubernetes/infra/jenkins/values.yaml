controller:
  # Cambiamos la imagen a una que incluya docker (o usa la tuya propia)
  # Nota: La imagen 'jenkins/jenkins' base no trae docker.
  # Lo ideal es que uses una imagen personalizada, pero probemos esto:
  image: "jenkins/jenkins" 
  tag: "lts-jdk17"
  
  # Muy importante: Ejecutar como root para poder usar el docker.sock
  runAsUser: 0
  fsGroup: 0
  
  # Si el initializeCommand falla, asegúrate de instalarlo así:
  initializeCommand: |
    apt-get update
    apt-get install -y docker.io
    # Damos permisos al grupo docker si fuera necesario
    usermod -aG docker jenkins

  extraVolumes:
    - name: docker-sock
      hostPath:
        path: /var/run/docker.sock
  extraVolumeMounts:
    - name: docker-sock
      mountPath: /var/run/docker.sock