controller:
  # En el Chart de Jenkins, installPlugins recibe directamente la lista de extensiones
  installPlugins:
    - "kubernetes:4458.v3978db_0a_88ef"
    - "workflow-aggregator:600.vb_b_e06f8e434e"
    - "git:5.5.0"
    - "github:1.40.0"                  # Requerido para Webhooks automáticos de Git
    - "docker-workflow:585.v675713b_69503" # Requerido para el bloque docker de tu Jenkinsfile
  
  admin:
    password: "admin"
  
  serviceType: NodePort
  nodePort: 32000

  podSecurityContext:
    runAsUser: 1000
    fsGroup: 1000
  
  # Desactivamos completamente el recargador para evitar el bucle de error SSL de Kubernetes
  sidecars:
    configAutoReload:
      enabled: false

persistence:
  enabled: true
  size: 10Gi
  storageClass: "microk8s-hostpath"