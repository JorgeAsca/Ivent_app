controller:
  # Imagen oficial con JDK 17
  image: "jenkins/jenkins"
  tag: "lts-jdk17"
  
  # Ejecutar como root para poder usar docker.sock
  runAsUser: 0
  
  # Instalar Docker al arrancar el contenedor
  installPlugins:
    - kubernetes:latest
    - workflow-aggregator:latest
    - git:latest
    - docker-workflow:latest
  
  # Esto instala Docker nativamente dentro del pod de Jenkins
  initializeCommand: |
    apt-get update
    apt-get install -y docker.io
    # Aseguramos que el usuario jenkins tenga permiso de docker
    usermod -aG docker jenkins

  extraVolumes:
    - name: docker-sock
      hostPath:
        path: /var/run/docker.sock
  extraVolumeMounts:
    - name: docker-sock
      mountPath: /var/run/docker.sock