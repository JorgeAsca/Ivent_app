controller:
  # Desactivamos la lista personalizada temporalmente para que levante limpio el core
  installPlugins: false

  admin:
    password: "admin"
  
  serviceType: NodePort
  nodePort: 32000

  podSecurityContext:
    runAsUser: 1000
    fsGroup: 1000
  
  # Al deshabilitar por completo las banderas internas del sidecar, 
  # el Chart elimina al contenedor problemático del ciclo de vida del Pod.
  sidecars:
    configAutoReload:
      enabled: false

persistence:
  enabled: true
  size: 10Gi
  storageClass: "microk8s-hostpath"