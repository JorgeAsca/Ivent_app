controller:
  admin:
    password: "admin"
  
  serviceType: NodePort
  nodePort: 32000

  runAsUser: 0
  fsGroup: 0

  # Instalación directa del cliente docker
  initializeCommand: |
    apt-get update && apt-get install -y docker.io
    usermod -aG docker jenkins

  extraVolumes:
    - name: docker-sock
      hostPath:
        path: /var/run/docker.sock
  extraVolumeMounts:
    - name: docker-sock
      mountPath: /var/run/docker.sock

persistence:
  enabled: true
  size: 8Gi  
  storageClass: "microk8s-hostpath"