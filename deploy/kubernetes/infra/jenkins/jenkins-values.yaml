controller:
  admin:
    password: "admin"
  
  serviceType: NodePort
  nodePort: 32000

  # Privilegios para interactuar con el socket del host
  runAsUser: 0
  runAsGroup: 0
  fsGroup: 0

  sidecars:
    configAutoReload:
      enabled: true
      image: "docker.io/kiwigrid/k8s-sidecar:2.7.3"
      env:
        - name: KUBERNETES_INSECURE_TLS
          value: "true"

  # QUITAMOS el initializeCommand por completo
  # No instalaremos nada aquí. 

  extraVolumes:
    - name: docker-sock
      hostPath:
        path: /var/run/docker.sock
  extraVolumeMounts:
    - name: docker-sock
      mountPath: /var/run/docker.sock

persistence:
  enabled: false
  size: 8Gi  
  storageClass: "microk8s-hostpath"