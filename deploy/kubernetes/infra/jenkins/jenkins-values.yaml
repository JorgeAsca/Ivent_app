controller:
  installPlugins: false

  admin:
    password: "admin"
  
  serviceType: NodePort
  nodePort: 32000

  # Forzamos a Jenkins a correr con id de usuario estándar para evitar bloqueos
  runAsUser: 1000
  fsGroup: 1000

  # Este comando nativo repara los permisos del directorio antes de que corra el motor
  initializeCommand: "chown -R 1000:1000 /var/jenkins_home"

  sidecars:
    configAutoReload:
      enabled: false

persistence:
  enabled: true
  size: 8Gi  # Lo bajamos a 8Gi para solucionar el error de Helm de inmediato
  storageClass: "microk8s-hostpath"